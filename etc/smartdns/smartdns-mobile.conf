# 移动平台专用配置
# 针对内存、电池和网络流量优化

# 绑定本地DNS端口
bind [::]:53

# 小缓存配置，节省RAM
cache-size 2048
cache-persist no

# 禁用预取功能，节省流量和电池
prefetch-domain no

# 轻量级速度检查，仅使用TCP连接检查，避免ICMP消耗
speed-check-mode tcp:443

# 禁用双栈IP选择，减少处理开销
dualstack-ip-selection no

# 设置较短的TCP连接空闲时间
tcp-idle-time 30

# 设置合理的TTL范围，减少重复查询
rr-ttl-min 60
rr-ttl-max 1800

# 减少日志输出，节省存储和I/O
log-level error
log-num 1
log-size 1M

# 启用过期缓存服务但限制时间
serve-expired yes
serve-expired-ttl 1800

# 禁用不必要的功能
force-AAAA-SOA no
force-qtype-SOA -

# 移动网络下的DNS服务器配置
# 国内常用DNS
server 223.5.5.5 -group mobile -exclude-default-group
server 223.6.6.6 -group mobile -exclude-default-group

# 国外常用DNS
server 8.8.8.8 -group overseas -exclude-default-group
server 1.1.1.1 -group overseas -exclude-default-group

# 针对特定区域的域名使用相应服务器组
domain-rules /google.com/ -group overseas -no-speed-check
domain-rules /youtube.com/ -group overseas -no-speed-check
domain-rules /facebook.com/ -group overseas -no-speed-check
domain-rules /twitter.com/ -group overseas -no-speed-check

# 针对中国地区域名使用国内服务器
domain-rules /.cn/ -group mobile -no-speed-check
domain-rules /.com.cn/ -group mobile -no-speed-check
domain-rules /baidu.com/ -group mobile -no-speed-check
domain-rules /qq.com/ -group mobile -no-speed-check
domain-rules /alibaba.com/ -group mobile -no-speed-check

# 限制返回IP数量，减少处理开销
max-reply-ip-num 1